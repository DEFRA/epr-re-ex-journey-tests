name: Check Pull Request

on:
  pull_request:
    branches:
      - '*'
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  pr-prep:
    name: Preparation
    runs-on: ubuntu-latest
    steps:
      - name: Prepare PR
        uses: DEFRA/epr-re-ex-service/.github/actions/pr-preparation@main

  pr-validator:
    name: Run Pull Request Checks
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Test code and Create Test Coverage Reports
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci --ignore-scripts
          npm run format:check
          npm run lint

  type-check:
    name: Lint Types - Tests
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: |
          npm ci --ignore-scripts
          npm run lint:types

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: pr-prep
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Docker image
        run: docker build .

  tests:
    name: Run Journey Tests (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: pr-prep
    # Named matrix passes (see the README "Feature flags in journey tests").
    # `baseline` is permanent and runs the compose.yml defaults. Most flags
    # never appear here: they live only in compose.yml and the suite asserts
    # that one configured state. A flag earns a matrix entry only when both of
    # its states genuinely warrant journey coverage, so the structure survives
    # flags coming and going: retire a flag by deleting its entry, and baseline
    # stays put. All blocking.
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: baseline
    steps:
      - name: Checkout journey-tests repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run journey tests
        uses: ./run-journey-tests
        with:
          branch: ${{ github.head_ref }}
          journey-test-pr: true

  # Aggregate gate carrying the exact name the branch ruleset requires; matrix
  # legs report as "Run Journey Tests (<name>)" and can't match it. `if: always()`
  # so a failing leg fails the gate rather than skipping it (a skipped required
  # check doesn't block). Do NOT delete or fold this into `tests`, even while
  # the matrix has a single leg: the ruleset's required check would never
  # report and every PR would block.
  tests-gate:
    name: Run Journey Tests
    runs-on: ubuntu-latest
    needs: tests
    if: always()
    steps:
      - name: Gate on all journey matrix passes
        shell: bash
        run: |
          if [ "${{ needs.tests.result }}" != "success" ]; then
            echo "one or more journey matrix passes did not succeed: ${{ needs.tests.result }}"
            exit 1
          fi
